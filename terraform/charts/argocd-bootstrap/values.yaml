certificate:
  name: argocd-gateway-tls
  secretName: argocd-gateway-tls
  issuerRefName: letsencrypt-production
  dnsName: argocd.example.com

gateway:
  name: public-gateway
  namespace: platform-ingress
  className: admancorp-envoy

envoyProxy:
  name: public-gateway-proxy
  dnsHostname: argocd.example.com

argocd:
  namespace: argocd
  serviceName: argocd-server
  servicePort: 80
  hostname: argocd.example.com
