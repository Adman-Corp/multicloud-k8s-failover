apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: {{ .Values.argocd.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.parentGatewayName }}
      namespace: {{ .Values.httproute.parentGatewayNamespace }}
      sectionName: https
  hostnames:
    - {{ .Values.argocd.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.argocd.serviceName }}
          port: {{ .Values.argocd.servicePort }}
