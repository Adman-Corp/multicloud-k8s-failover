apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.certificate.issuerRefName }}
  dnsNames:
{{- range .Values.certificate.dnsNames }}
    - {{ . | quote }}
{{- end }}
