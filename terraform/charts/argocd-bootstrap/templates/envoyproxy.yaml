apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Values.envoyProxy.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: {{ .Values.envoyProxy.dnsHostname }}
      envoyDeployment:
        replicas: 2
      envoyPDB:
        minAvailable: 1
