apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ .Values.envoyProxy.name }}
      namespace: {{ .Values.gateway.namespace }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-argocd
      hostname: {{ .Values.argocd.hostname }}
      protocol: HTTPS
      port: 443
      tls:
        certificateRefs:
          - kind: Secret
            name: {{ .Values.certificate.secretName }}
      allowedRoutes:
        namespaces:
          from: All
