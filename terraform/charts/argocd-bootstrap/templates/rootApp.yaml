apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: {{ .Values.argocd.namespace }}
spec:
  project: default
  source:
    repoURL: https://github.com/Adman-Corp/admancorp-argocd-apps.git
    targetRevision: main
    path: charts/argocd-apps
    helm:
      valueFiles:
        - values.yaml
        - values-{{ .Values.cloud }}-{{ .Values.environment }}.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.argocd.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
